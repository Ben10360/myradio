<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BEN10 RADIO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
radial-gradient(circle at top left,#00ff8840,transparent 30%),
radial-gradient(circle at bottom right,#00ff8830,transparent 30%),
#050816;

color:white;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow:hidden;

}

/* CARD */

.card{

width:100%;
max-width:420px;

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(25px);

border-radius:30px;

padding:25px;

box-shadow:0 0 50px rgba(0,255,136,0.08);

}

/* TITLE */

.logo{

text-align:center;

font-size:32px;
font-weight:700;

color:#38bdf8;

margin-bottom:20px;

text-shadow:0 0 20px #38bdf8;

}

/* IMAGE */

.cover{

width:100%;
height:260px;

object-fit:cover;

border-radius:25px;

margin-bottom:20px;

}

/* SONG */

.song{

font-size:20px;
font-weight:600;

text-align:center;

margin-bottom:10px;

word-break:break-word;

}

.artist{

text-align:center;

color:#999;

margin-bottom:20px;

}

/* AUDIO */

audio{

width:100%;

margin-bottom:20px;

}

/* BUTTON */

.btn{

width:100%;

padding:15px;

border:none;

border-radius:18px;

background:#38bdf8;

color:white;

font-size:17px;
font-weight:700;

cursor:pointer;

transition:0.3s;

}

.btn:hover{

transform:scale(1.03);

box-shadow:0 0 20px #38bdf8;

}

/* ABOUT */

.about{

margin-top:20px;

text-align:center;

}

.about a{

color:#38bdf8;

text-decoration:none;

font-size:16px;

}

/* MOBILE */

@media(max-width:500px){

.logo{

font-size:26px;

}

.cover{

height:220px;

}

.song{

font-size:17px;

}

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

BEN10 RADIO

</div>

<img class="cover"

src="https://wallpapercave.com/wp/wp16354549.webp">

<div class="song" id="songName">

Ready To Play

</div>

<div class="artist">

24/7 Online Radio

</div>

<audio id="audio" controls></audio>

<button class="btn" onclick="playSong()">

PLAY RADIO

</button>

<div class="about">

<a href="about.html">

👤 About Me

</a>

</div>

</div>

<script>

const songs = [

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Cheshme+Man.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Bonbast.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Booye+Gandom.mp3"

];

let currentSong = 0;

const audio = document.getElementById("audio");

const songName = document.getElementById("songName");

function loadSong(index){

audio.src = songs[index];

songName.innerText = decodeURIComponent(

songs[index]
.split("/")
.pop()
.replace(".mp3","")
.replaceAll("+"," ")

);

}

function playSong(){

audio.play();

}

function nextSong(){

currentSong++;

if(currentSong >= songs.length){

currentSong = 0;

}

loadSong(currentSong);

audio.play();

}

audio.addEventListener("ended", nextSong);

loadSong(currentSong);

</script>

</body>
</html>
