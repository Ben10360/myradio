<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breaking Radio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial, sans-serif;

background:#000;

background-image:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
url('https://wallpapercave.com/wp/wp7009536.jpg');

background-size:cover;
background-position:center;

color:white;

}

.player{

width:350px;

background:rgba(0,0,0,0.7);

border:2px solid #00ff88;

border-radius:25px;

padding:30px;

text-align:center;

backdrop-filter:blur(8px);

box-shadow:0 0 25px #00ff88;

}

.logo{

font-size:70px;
margin-bottom:10px;

}

h1{

font-size:32px;
color:#00ff88;

margin-bottom:10px;

}

.subtitle{

color:#ccc;
margin-bottom:20px;

}

#songName{

margin-top:20px;

font-size:15px;

color:#fff;

}

audio{

width:100%;

margin-top:20px;

}

.buttons{

margin-top:20px;

}

button{

background:#00ff88;

border:none;

padding:12px 18px;

margin:5px;

border-radius:12px;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.08);

}

.footer{

margin-top:20px;

font-size:12px;

color:#888;

}

</style>
</head>

<body>

<div class="player">

<div class="logo">🧪</div>

<h1>BREAKING RADIO</h1>

<p class="subtitle">Walter White FM</p>

<p id="songName">Loading...</p>

<audio id="audio" controls autoplay></audio>

<div class="buttons">

<button onclick="prevSong()">⏮ Prev</button>

<button onclick="nextSong()">Next ⏭</button>

</div>

<div class="footer">

Say My Name

</div>

</div>

<script>

const songs = [

"songs/mp3.mp3"

];

let currentSong = 0;

const audio = document.getElementById("audio");

const songName = document.getElementById("songName");

function loadSong(index){

audio.src = songs[index];

songName.innerText = songs[index]
.split("/")
.pop();

audio.play();

}

function nextSong(){

currentSong++;

if(currentSong >= songs.length){

currentSong = 0;

}

loadSong(currentSong);

}

function prevSong(){

currentSong--;

if(currentSong < 0){

currentSong = songs.length - 1;

}

loadSong(currentSong);

}

audio.addEventListener("ended", nextSong);

loadSong(currentSong);

</script>

</body>
</html>
