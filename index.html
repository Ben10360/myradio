```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BEN10 RADIO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
radial-gradient(circle at top left,#00ff8840,transparent 30%),
radial-gradient(circle at bottom right,#00ff8830,transparent 30%),
#050816;

color:white;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

}

/* BACKGROUND */

.blur{

position:absolute;

width:500px;
height:500px;

background:#00ff88;

filter:blur(180px);

opacity:0.15;

border-radius:50%;

top:-150px;
left:-100px;

}

/* CARD */

.card{

width:420px;

background:rgba(255,255,255,0.04);

border:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(25px);

border-radius:35px;

padding:30px;

box-shadow:0 0 50px rgba(0,255,136,0.08);

position:relative;

z-index:2;

}

/* TITLE */

.logo{

text-align:center;

font-size:38px;
font-weight:700;

color:#00ff88;

margin-bottom:25px;

text-shadow:0 0 20px #00ff88;

}

/* IMAGE */

.cover{

width:100%;
height:280px;

border-radius:28px;

object-fit:cover;

margin-bottom:25px;

border:2px solid rgba(0,255,136,0.2);

}

/* SONG */

.song{

font-size:22px;
font-weight:600;

margin-bottom:10px;

text-align:center;

}

.artist{

text-align:center;

color:#999;

margin-bottom:25px;

}

/* AUDIO */

audio{

width:100%;

filter:hue-rotate(70deg);

margin-bottom:20px;

}

/* BUTTON */

.btn{

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:#00ff88;

color:black;

font-size:16px;
font-weight:700;

cursor:pointer;

transition:0.3s;

}

.btn:hover{

transform:translateY(-5px);

box-shadow:0 0 25px #00ff88;

}

/* ABOUT */

.about{

margin-top:20px;

text-align:center;

}

.about a{

color:#00ff88;

text-decoration:none;

font-size:15px;

}

</style>

</head>

<body>

<div class="blur"></div>

<div class="card">

<div class="logo">
BEN10 RADIO
</div>

<img class="cover"
src="https://wallpapercave.com/wp/wp16354549.webp">

<div class="song" id="songName">
Loading...
</div>

<div class="artist">
24/7 Online Radio
</div>

<audio id="audio" controls></audio>

<button class="btn" onclick="nextSong()">
NEXT SONG
</button>

<div class="about">

<a href="https://google.com" target="_blank">

👤 About Me

</a>

</div>

</div>

<script>

const songs = [

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Cheshme+Man.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Bonbast.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Booye+Gandom.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Faryad+Zire+Aab.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Gelayeh.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Ghalandar.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Gozashtehaye+Door.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Hasood.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Khorshid+Khanoom.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Shaghayegh.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Niyayesh.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Shahre+Gham.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Tange+Ghoroobeh.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush+-+Vatan.mp3",

"https://archive.org/download/dariush-booye-gandom/Dariush-Shirin-Shirin.mp3"

];

let currentSong = 0;

const audio = document.getElementById("audio");
const songName = document.getElementById("songName");

function loadSong(index){

audio.src = songs[index];

songName.innerText = decodeURIComponent(
songs[index]
.split("/")
.pop()
.replace(".mp3","")
.replaceAll("+"," ")
);

audio.load();

}

function nextSong(){

currentSong++;

if(currentSong >= songs.length){

currentSong = 0;

}

loadSong(currentSong);

audio.play();

}

audio.addEventListener("ended", nextSong);

audio.addEventListener("canplay", () => {

audio.play();

});

loadSong(currentSong);

</script>

</body>
</html>
```
