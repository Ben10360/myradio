
```html
<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breaking Bad Radio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop');

    background-size:cover;
    background-position:center;

    overflow:hidden;

}

.player{

    width:370px;

    background:rgba(20,20,20,0.85);

    border:2px solid #00ff88;

    border-radius:25px;

    padding:30px;

    text-align:center;

    backdrop-filter:blur(10px);

    box-shadow:
    0 0 20px #00ff88,
    0 0 40px rgba(0,255,136,0.3);

}

.logo{

    font-size:80px;

    margin-bottom:10px;

}

h1{

    color:#00ff88;

    font-size:35px;

    margin-bottom:10px;

    letter-spacing:2px;

}

.subtitle{

    color:#ccc;

    margin-bottom:20px;

}

#songName{

    color:#fff;

    margin-top:20px;

    font-size:15px;

    word-break:break-word;

}

audio{

    width:100%;

    margin-top:20px;

    filter:hue-rotate(80deg);

}

.buttons{

    margin-top:20px;

}

button{

    background:#00ff88;

    border:none;

    color:black;

    padding:12px 18px;

    margin:5px;

    border-radius:12px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

}

button:hover{

    transform:scale(1.08);

    box-shadow:0 0 15px #00ff88;

}

.footer{

    margin-top:20px;

    color:#888;

    font-size:12px;

}

.smoke{

    position:absolute;

    width:200px;

    height:200px;

    background:rgba(255,255,255,0.03);

    border-radius:50%;

    filter:blur(30px);

    animation:float 10s infinite linear;

}

.smoke:nth-child(1){

    top:10%;
    left:10%;

}

.smoke:nth-child(2){

    bottom:10%;
    right:10%;

    animation-duration:15s;

}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-30px);
    }

    100%{
        transform:translateY(0px);
    }

}

</style>
</head>
<body>

<div class="smoke"></div>
<div class="smoke"></div>

<div class="player">

<div class="logo">🧪</div>

<h1>BREAKING RADIO</h1>

<p class="subtitle">Walter White FM</p>

<p id="songName">Loading...</p>

<audio id="audio" controls autoplay></audio>

<div class="buttons">

<button onclick="prevSong()">⏮ Prev</button>

<button onclick="nextSong()">Next ⏭</button>

</div>

<div class="footer">

Say My Name 🎵

</div>

</div>

<script>

const songs = [

"songs/mp3.mp3"

];

let currentSong = 0;

const audio = document.getElementById("audio");

const songName = document.getElementById("songName");

function loadSong(index){

    audio.src = songs[index];

    let name = songs[index]
        .split("/")
        .pop();

    songName.innerText = name;

    audio.play();

}

function nextSong(){

    currentSong++;

    if(currentSong >= songs.length){

        currentSong = 0;

    }

    loadSong(currentSong);

}

function prevSong(){

    currentSong--;

    if(currentSong < 0){

        currentSong = songs.length - 1;

    }

    loadSong(currentSong);

}

audio.addEventListener("ended", nextSong);

loadSong(currentSong);

</script>

</body>
</html>
