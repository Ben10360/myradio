<div class="container">

<button>🔴 LIVE RADIO</button>
<button>🎵 PLAYLIST</button>
<button>🕓 SCHEDULE</button>
<button>⭐ FAVORITES</button>
<button>💬 CHAT</button>
<button>ℹ ABOUT</button>

</div>

</div>

<div class="main">

<div class="hero"></div>

<div class="title">SCARFACE</div>

<div class="player">

<div class="top">

<img class="cover" src="https://wallpapercave.com/wp/wp7009536.jpg">

<div class="info">

<div class="live">● LIVE</div>

<h1>MY RADIO</h1>

<p id="songName">Loading...</p>

</div>

<button class="play-btn" onclick="togglePlay()">▶</button>

</div>

<audio id="audio" controls></audio>

<div class="social">

<div>📷</div>
<div>✈</div>
<div>🎧</div>
<div>🌐</div>

</div>

</div>

</div>

</div>

<script>

const songs = [

"songs/Ahange Shahlay Man [SevilMusic] - Copy.mp3",
"songs/Ahange Shahlay Man [SevilMusic].mp3",
"songs/Dariush - Baradar Jaan - Copy.mp3",
"songs/Dariush - Baradar Jaan.mp3",
"songs/Dariush - Be man Nagoo Dooset Daram - Copy.mp3",
"songs/Dariush - Be man Nagoo Dooset Daram.mp3",
"songs/Dariush - Bonbast.mp3",
"songs/Dariush - Booye Gandom.mp3",
"songs/Dariush - Cheshme Man.mp3",
"songs/Dariush - Faryad Zire Aab.mp3",
"songs/Habib - Nafas [320].mp3",
"songs/Habib - Maro Baash [320].mp3"

];

let currentSong = 0;

const audio = document.getElementById("audio");
const songName = document.getElementById("songName");
const playBtn = document.querySelector(".play-btn");

function loadSong(index){

audio.src = songs[index];

songName.innerText = songs[index]
.split("/")
.pop();

}

function togglePlay(){

if(audio.paused){

audio.play();
playBtn.innerHTML = "⏸";

}else{

audio.pause();
playBtn.innerHTML = "▶";

}

}

function nextSong(){

currentSong++;

if(currentSong >= songs.length){

currentSong = 0;

}

loadSong(currentSong);

audio.play();

}

audio.addEventListener("ended", nextSong);

loadSong(currentSong);

</script>

</body>
